<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Confirmar punto</title>
<style>
:root{--bg:#f6f2ec;--card:rgba(255,255,255,.85);--text:#2a211c;--muted:#7a6d65;--line:rgba(60,40,25,.08);--accent:#6f4e37;--success:#6e9368;--danger:#b85d5d;--radius:22px;--maxw:420px}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;justify-content:center;align-items:center}
.shell{width:100%;max-width:var(--maxw)}
.phone{height:100vh;max-height:800px;border-radius:30px;overflow:hidden;background:rgba(255,255,255,.6);backdrop-filter:blur(20px);box-shadow:0 20px 50px rgba(0,0,0,.1)}
.screen{display:flex;flex-direction:column;height:100%;padding:14px;gap:10px}
.topbar{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;gap:8px;align-items:center;font-weight:700}
.icon-btn{border:none;background:#fff;border-radius:12px;padding:6px 10px;cursor:pointer}
.hero{padding:12px;border-radius:var(--radius);background:var(--card)}
.hero h1{font-size:20px;margin:0}
.meta{display:flex;gap:6px;margin-top:6px;font-size:11px;color:var(--muted)}
.progress{display:flex;flex-direction:column;gap:6px;padding:10px;border-radius:var(--radius);background:var(--card)}
.progress-top{display:flex;justify-content:space-between;align-items:center}
.points{font-size:18px;font-weight:700}
.cups{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.cup{font-size:14px;border-radius:10px;background:#eee;display:grid;place-items:center;padding:6px}
.cup.filled{background:#6f4e37;color:#fff}
.action{display:flex;gap:6px;padding:10px;border-radius:var(--radius);background:var(--card)}
.action input{flex:1;padding:10px;border-radius:12px;border:1px solid #ddd}
.action button{border:none;border-radius:12px;padding:10px 12px;background:#6f4e37;color:#fff;font-weight:600}
.secondary{background:#6e9368}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;padding:10px;border-radius:var(--radius);background:var(--card);font-size:11px;text-align:center}
.summary div{display:flex;flex-direction:column}
.summary strong{font-size:12px}
.status{font-size:11px;text-align:center;color:var(--muted)}
.hidden{display:none}
</style>
</head>
<body>
<div class="shell">
<div class="phone">
<div id="appView" class="screen">

<div class="topbar">
<div class="brand">☕ <span id="negocioNombre">Café Urbano</span></div>
<button class="icon-btn" id="btnRecargar">↻</button>
</div>

<div class="hero">
<h1 id="clienteNombre">Cliente</h1>
<div class="meta">
<span id="clienteId">ID</span>
<span id="clienteEstado">Activo</span>
</div>
</div>

<div class="progress">
<div class="progress-top">
<span id="faltanText">Progreso</span>
<div class="points"><span id="pointsCount">0</span>/<span id="goalCount">10</span></div>
</div>
<div class="cups" id="cupsGrid"></div>
</div>

<div class="action">
<input id="pinInput" placeholder="PIN" maxlength="6">
<button id="btnConfirmar">OK</button>
<button id="btnCanjear" class="secondary hidden">🎁</button>
</div>

<div class="summary">
<div><span>Visita</span><strong id="ultimaVisita">—</strong></div>
<div><span>Premio</span><strong id="premioEstado">—</strong></div>
<div><span>Caja</span><strong id="usuarioMostradorLabel">Caja 1</strong></div>
</div>

<div class="status" id="statusBox"></div>

</div>
</div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbwJjVizJZJ8tDyA7ESkdfIhaagZ1pEMTnvJpPny6HuhLDRoKwTJu06-L2ZpJVMVO4lR/exec';
const state={id:null,cliente:null,metaPuntos:10,recompensa:'Café gratis'};

function qs(n){return new URLSearchParams(window.location.search).get(n)}
function renderCups(p){const g=document.getElementById('cupsGrid');g.innerHTML='';for(let i=1;i<=10;i++){let d=document.createElement('div');d.className='cup'+(i<=p?' filled':'');d.textContent='☕';g.appendChild(d)}}

function render(){const c=state.cliente;if(!c)return;
const p=Number(c.puntos||0);
const premio=c.premio_disponible==='SI';
document.getElementById('clienteNombre').textContent=c.nombre||'Cliente';
document.getElementById('clienteId').textContent='ID: '+c.id_cliente;
document.getElementById('clienteEstado').textContent='Estado: '+(c.estado||'ACTIVO');
document.getElementById('pointsCount').textContent=p;
document.getElementById('goalCount').textContent=state.metaPuntos;
document.getElementById('ultimaVisita').textContent=new Date(c.ultima_visita||Date.now()).toLocaleDateString();
document.getElementById('premioEstado').textContent=premio?'Disponible':'Sin premio';
document.getElementById('faltanText').textContent=premio?'Listo para canjear':`Faltan ${state.metaPuntos-p}`;
document.getElementById('btnCanjear').classList.toggle('hidden',!premio);
renderCups(p);
}

async function apiGet(p){const r=await fetch(API_URL+'?'+new URLSearchParams(p));return r.json()}
async function apiPost(p){const f=new URLSearchParams();Object.keys(p).forEach(k=>f.append(k,p[k]));const r=await fetch(API_URL,{method:'POST',body:f});return r.json()}

async function load(){state.id=qs('id');if(!state.id){document.getElementById('statusBox').textContent='QR inválido';return}
try{const d=await apiGet({action:'getClient',id:state.id});if(!d.ok)throw new Error();state.cliente=d.cliente;render()}catch(e){document.getElementById('statusBox').textContent='Error cargando cliente';}}

async function confirm(){const pin=document.getElementById('pinInput').value.trim();if(!pin)return alert('PIN requerido');
const d=await apiPost({action:'confirmPoint',id:state.id,pin});if(!d.ok)return alert(d.message);
state.cliente=d.cliente;render();document.getElementById('pinInput').value='';}

async function canjear(){const pin=document.getElementById('pinInput').value.trim();if(!pin)return alert('PIN requerido');
const d=await apiPost({action:'redeemReward',id:state.id,pin});if(!d.ok)return alert(d.message);
await load();document.getElementById('pinInput').value='';}

document.getElementById('btnConfirmar').onclick=confirm;
document.getElementById('btnCanjear').onclick=canjear;
document.getElementById('btnRecargar').onclick=load;

load();
</script>
</body>
</html>
