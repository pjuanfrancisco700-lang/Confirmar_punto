<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="color-scheme" content="light" />
  <title>Confirmar punto</title>
  <style>
    :root {
      --bg-1: #f8f3ed;
      --bg-2: #efe5db;
      --bg-3: #e8dbcf;

      --surface: rgba(255,255,255,0.76);
      --surface-strong: rgba(255,255,255,0.90);
      --surface-soft: rgba(250,245,239,0.94);

      --card: #fffaf6;
      --card-soft: #f7efe7;

      --text: #1f1713;
      --text-2: #5f534b;
      --muted: #8b7d73;

      --line: rgba(90, 68, 52, 0.08);
      --line-2: rgba(90, 68, 52, 0.12);

      --coffee-1: #b8895f;
      --coffee-2: #9a6c49;
      --coffee-3: #7f563c;
      --coffee-4: #6b4733;

      --cream: #fff8f2;
      --green-1: #7ea072;
      --green-2: #66875b;
      --danger: #b75e5e;

      --shadow-xs: 0 6px 16px rgba(53, 36, 25, 0.05);
      --shadow-sm: 0 14px 30px rgba(53, 36, 25, 0.08);
      --shadow-md: 0 20px 48px rgba(53, 36, 25, 0.12);
      --shadow-lg: 0 30px 70px rgba(53, 36, 25, 0.18);

      --radius-xl: 34px;
      --radius-lg: 28px;
      --radius-md: 22px;
      --radius-sm: 18px;
      --radius-xs: 14px;

      --maxw: 440px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      color-scheme: light;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.78) 0%, transparent 28%),
        radial-gradient(circle at top right, rgba(255,245,235,0.8) 0%, transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
    }

    @media (prefers-color-scheme: dark) {
      html, body {
        color-scheme: light !important;
        color: var(--text) !important;
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.78) 0%, transparent 28%),
          radial-gradient(circle at top right, rgba(255,245,235,0.8) 0%, transparent 24%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%) !important;
      }
    }

    body {
      display: flex;
      justify-content: center;
      padding: 12px;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(30px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 220px;
      height: 220px;
      top: -70px;
      left: -60px;
      background: rgba(255,255,255,0.42);
    }

    body::after {
      width: 280px;
      height: 280px;
      right: -110px;
      bottom: 8%;
      background: rgba(184,137,95,0.10);
    }

    .shell {
      width: 100%;
      max-width: var(--maxw);
      position: relative;
      z-index: 1;
    }

    .phone {
      min-height: calc(100vh - 24px);
      position: relative;
      overflow: hidden;
      border-radius: 38px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.74) 0%, rgba(249,242,235,0.84) 100%);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      isolation: isolate;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.75), transparent 35%),
        radial-gradient(circle at bottom left, rgba(255,255,255,0.45), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0));
      pointer-events: none;
      z-index: 0;
    }

    .phone::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 10px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.58), rgba(255,255,255,0.06), rgba(255,255,255,0.58));
      opacity: 0.75;
      pointer-events: none;
      z-index: 1;
    }

    .screen {
      position: relative;
      z-index: 2;
      padding: 16px;
      padding-bottom: 22px;
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.60) 0%, rgba(247,239,232,0.58) 100%);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow-xs);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-badge,
    .icon-btn {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.75);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(245,236,228,0.92) 100%);
      box-shadow:
        0 10px 22px rgba(70, 46, 31, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.92);
    }

    .brand-badge {
      font-size: 20px;
    }

    .brand-text {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .brand-kicker {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1;
    }

    #negocioNombre {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
      transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease;
    }

    .icon-btn:active,
    .ghost-btn:active,
    .primary-btn:active,
    .secondary-btn:active {
      transform: scale(0.985);
    }

    .card {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(248,242,235,0.96) 100%);
      border: 1px solid rgba(255,255,255,0.86);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), transparent 42%);
      pointer-events: none;
    }

    .hero {
      padding: 22px 18px 18px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.20), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,255,255,0.08), transparent 24%),
        linear-gradient(145deg, var(--coffee-1) 0%, var(--coffee-2) 28%, var(--coffee-3) 62%, var(--coffee-4) 100%);
      color: var(--cream);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 22px 46px rgba(92, 60, 40, 0.28);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -30px;
      top: -60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #6d6057;
    }

    .hero .eyebrow {
      color: rgba(255,248,241,0.76);
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .hero h1 {
      font-size: 32px;
      line-height: 1.02;
      letter-spacing: -0.08em;
      margin-bottom: 10px;
      max-width: 90%;
    }

    .hero p {
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255,248,241,0.84);
      max-width: 92%;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .tiny-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 10px 15px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #5f5147;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(248,241,234,0.92) 100%);
      border: 1px solid rgba(255,255,255,0.80);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.92);
    }

    .hero .tiny-pill {
      color: var(--cream);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .section-kicker {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .progress-card {
      padding-top: 16px;
    }

    .progress-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .progress-head h2 {
      font-size: 24px;
      line-height: 1.02;
      letter-spacing: -0.06em;
      margin-bottom: 4px;
    }

    .progress-head p {
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.35;
    }

    .big-points {
      min-width: 90px;
      text-align: right;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(247,239,231,0.94) 100%);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.94);
    }

    .big-points strong {
      color: var(--text);
      font-size: 29px;
      line-height: 1;
      letter-spacing: -0.07em;
      margin-right: 2px;
    }

    .cups {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 11px;
    }

    .cup {
      position: relative;
      aspect-ratio: 1;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 26px;
      color: #d2c3b5;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(245,238,231,0.98) 100%);
      border: 1px solid rgba(110, 86, 68, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 8px 18px rgba(61, 43, 31, 0.05);
      transition: all .22s ease;
    }

    .cup::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.20), transparent 54%);
      pointer-events: none;
    }

    .cup.filled {
      color: #fffaf6;
      background:
        linear-gradient(180deg, #c1946d 0%, #a77753 45%, #895f43 100%);
      border-color: rgba(111, 78, 55, 0.16);
      box-shadow:
        0 14px 26px rgba(111, 78, 55, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    .info-card {
      padding-top: 16px;
    }

    .info-grid {
      display: grid;
      gap: 0;
      margin-bottom: 8px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.36), rgba(255,255,255,0.12));
      border: 1px solid rgba(95,74,58,0.06);
      padding: 2px 0;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 0;
      margin: 0 2px;
      border-top: 1px solid rgba(115, 92, 75, 0.10);
    }

    .info-row:first-child {
      border-top: none;
      padding-top: 10px;
    }

    .info-label {
      color: #776a61;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .info-value {
      font-weight: 800;
      text-align: right;
      font-size: 14px;
      line-height: 1.3;
      max-width: 62%;
      word-break: break-word;
      letter-spacing: -0.02em;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .field label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #695b52;
    }

    .pin-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    .field input {
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(115, 92, 75, 0.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(249,243,237,0.96) 100%);
      border-radius: 22px;
      padding: 16px 18px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.94),
        0 6px 16px rgba(58, 38, 28, 0.03);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .field input::placeholder {
      color: #a69588;
    }

    .field input:focus {
      border-color: rgba(154,108,73,0.24);
      box-shadow:
        0 0 0 4px rgba(154,108,73,0.08),
        0 10px 20px rgba(58, 38, 28, 0.05);
      background: #fff;
    }

    .ghost-btn,
    .primary-btn,
    .secondary-btn {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 20px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .ghost-btn {
      width: auto;
      min-width: 76px;
      padding-inline: 16px;
      color: var(--coffee-4);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(246,238,231,0.95) 100%);
      border: 1px solid rgba(115, 92, 75, 0.10);
      box-shadow: var(--shadow-xs);
    }

    .secondary-btn {
      color: #fffdfb;
      background:
        linear-gradient(180deg, #ab7a57 0%, #8a6144 100%);
      box-shadow:
        0 16px 30px rgba(123, 89, 65, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .primary-btn {
      color: #fffdfb;
      background:
        linear-gradient(180deg, #84a878 0%, #6a8b5f 100%);
      box-shadow:
        0 16px 30px rgba(104, 134, 95, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .secondary-btn:disabled,
    .primary-btn:disabled,
    .ghost-btn:disabled,
    .icon-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      filter: grayscale(0.04);
    }

    .split-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .status-box {
      border-radius: 18px;
      padding: 14px 15px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
      border: 1px solid transparent;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.60);
    }

    .status-box.info {
      background: rgba(154,108,73,0.10);
      color: #7f563c;
      border-color: rgba(154,108,73,0.12);
    }

    .status-box.ok {
      background: rgba(104,134,95,0.11);
      color: #66875b;
      border-color: rgba(104,134,95,0.14);
    }

    .status-box.error {
      background: rgba(183,94,94,0.10);
      color: var(--danger);
      border-color: rgba(183,94,94,0.14);
    }

    .status-hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .center-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      padding: 2px 10px 0;
      letter-spacing: -0.01em;
    }

    .loading {
      min-height: calc(100vh - 24px);
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      position: relative;
      z-index: 2;
    }

    .loading-card {
      width: 100%;
      max-width: 290px;
      padding: 28px 22px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94) 0%, rgba(246,239,232,0.96) 100%);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .loading-icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(243,235,228,0.94) 100%);
      border: 1px solid rgba(115, 92, 75, 0.08);
      box-shadow: var(--shadow-sm);
      font-size: 28px;
    }

    .loading strong {
      display: block;
      color: var(--text);
      font-size: 20px;
      letter-spacing: -0.05em;
    }

    .loading p {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 390px) {
      body {
        padding: 8px;
      }

      .phone {
        min-height: calc(100vh - 16px);
        border-radius: 30px;
      }

      .screen {
        padding: 13px;
        gap: 10px;
      }

      .topbar {
        padding: 9px 10px;
      }

      .brand-badge,
      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 16px;
      }

      .hero {
        padding: 18px 16px 16px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .card {
        padding: 16px;
      }

      .cups {
        gap: 9px;
      }

      .cup {
        border-radius: 18px;
        font-size: 23px;
      }

      .big-points {
        min-width: 78px;
        padding: 9px 10px;
      }

      .big-points strong {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="phone">
      <div id="loadingView" class="loading">
        <div class="loading-card">
          <div class="loading-icon">☕</div>
          <strong>Cargando</strong>
          <p>Preparando cliente.</p>
        </div>
      </div>

      <div id="appView" class="screen hidden">
        <div class="topbar">
          <div class="brand">
            <div class="brand-badge">☕</div>
            <div class="brand-text">
              <span class="brand-kicker">Coffee Bike</span>
              <div id="negocioNombre">Café Urbano</div>
            </div>
          </div>
          <button class="icon-btn" id="btnRecargar" title="Recargar">↻</button>
        </div>

        <div class="card hero">
          <p class="eyebrow">Confirmar punto</p>
          <h1 id="clienteNombre">Cliente</h1>
          <p id="heroMsg">Ingresa el PIN para confirmar.</p>
          <div class="meta-row">
            <span class="tiny-pill" id="clienteId">ID: —</span>
            <span class="tiny-pill" id="clienteEstado">Estado: —</span>
          </div>
        </div>

        <div class="card progress-card">
          <div class="section-kicker">Progreso</div>
          <div class="progress-head">
            <div>
              <h2>Puntos</h2>
              <p id="faltanText">Puntos pendientes.</p>
            </div>
            <div class="big-points"><strong id="pointsCount">0</strong> / <span id="goalCount">10</span></div>
          </div>
          <div class="cups" id="cupsGrid"></div>
        </div>

        <div class="card info-card">
          <div class="section-kicker">Detalle</div>

          <div class="info-grid">
            <div class="info-row">
              <span class="info-label">Última visita</span>
              <span class="info-value" id="ultimaVisita">—</span>
            </div>
            <div class="info-row">
              <span class="info-label">Premio</span>
              <span class="info-value" id="premioEstado">Sin premio</span>
            </div>
            <div class="info-row">
              <span class="info-label">Mostrador</span>
              <span class="info-value" id="usuarioMostradorLabel">Caja 1</span>
            </div>
          </div>

          <div class="field">
            <label for="usuarioInput">Caja o encargado</label>
            <input id="usuarioInput" type="text" value="Caja 1" placeholder="Caja 1" style="letter-spacing: normal; font-size: 15px;" />
          </div>

          <div class="field">
            <label for="pinInput">PIN</label>
            <div class="pin-wrap">
              <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••" />
              <button class="ghost-btn" id="btnVerPin" type="button">Ver</button>
            </div>
          </div>

          <div class="split-actions" style="margin-top:16px;">
            <button class="secondary-btn" id="btnConfirmar">Confirmar punto</button>
            <button class="primary-btn hidden" id="btnCanjear">Canjear recompensa</button>
          </div>

          <div id="statusBox" class="status-box info status-hidden" style="margin-top:14px;"></div>
        </div>

        <p class="center-note">El punto se guarda solo con PIN válido.</p>
      </div>
    </div>
  </div>

  <script>
    /*
      PEGA AQUÍ TU URL DE APPS SCRIPT
      Ejemplo: const API_URL = 'https://script.google.com/macros/s/XXXXXXXX/exec';
    */
    const API_URL = 'https://script.google.com/macros/s/AKfycbwJjVizJZJ8tDyA7ESkdfIhaagZ1pEMTnvJpPny6HuhLDRoKwTJu06-L2ZpJVMVO4lR/exec';
    const DEFAULT_GOAL = 0;
    const DEFAULT_REWARD = 'Café gratis';

    const loadingView = document.getElementById('loadingView');
    const appView = document.getElementById('appView');
    const btnRecargar = document.getElementById('btnRecargar');
    const btnVerPin = document.getElementById('btnVerPin');
    const btnConfirmar = document.getElementById('btnConfirmar');
    const btnCanjear = document.getElementById('btnCanjear');
    const statusBox = document.getElementById('statusBox');
    const pinInput = document.getElementById('pinInput');
    const usuarioInput = document.getElementById('usuarioInput');

    const state = {
      id: null,
      cliente: null,
      metaPuntos: DEFAULT_GOAL,
      recompensa: DEFAULT_REWARD,
      negocio: 'Café Urbano'
    };

    function qs(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function safeText(value, fallback = '—') {
      return value && String(value).trim() ? String(value).trim() : fallback;
    }

    function formatDate(value) {
      if (!value) return 'Sin registro';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return safeText(value, 'Sin fecha');
      return date.toLocaleString('es-GT', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showStatus(message, type = 'info') {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.classList.remove('status-hidden');
    }

    function hideStatus() {
      statusBox.className = 'status-box info status-hidden';
      statusBox.textContent = '';
    }

    function showApp() {
      loadingView.classList.add('hidden');
      appView.classList.remove('hidden');
    }

    function renderCups(points, goal) {
      const cupsGrid = document.getElementById('cupsGrid');
      cupsGrid.innerHTML = '';
      const total = Math.max(Number(goal) || 1, 1);
      for (let i = 1; i <= total; i++) {
        const item = document.createElement('div');
        item.className = `cup ${i <= points ? 'filled' : ''}`;
        item.textContent = '☕';
        cupsGrid.appendChild(item);
      }
    }

    function renderCliente() {
      const c = state.cliente;
      if (!c) return;

      const points = Number(c.puntos || 0);
      const premioDisponible = String(c.premio_disponible || 'NO').toUpperCase() === 'SI';
      const faltan = Math.max(0, state.metaPuntos - points);

      document.getElementById('negocioNombre').textContent = state.negocio;
      document.getElementById('clienteNombre').textContent = safeText(c.nombre, 'Cliente');
      document.getElementById('clienteId').textContent = `ID: ${safeText(c.id_cliente)}`;
      document.getElementById('clienteEstado').textContent = `Estado: ${safeText(c.estado, 'ACTIVO')}`;
      document.getElementById('pointsCount').textContent = points;
      document.getElementById('goalCount').textContent = state.metaPuntos;
      document.getElementById('ultimaVisita').textContent = formatDate(c.ultima_visita);
      document.getElementById('premioEstado').textContent = premioDisponible ? `${state.recompensa} disponible` : 'Sin premio';
      document.getElementById('usuarioMostradorLabel').textContent = safeText(usuarioInput.value, 'Caja 1');

      document.getElementById('heroMsg').textContent = premioDisponible
        ? `Este cliente ya tiene ${state.recompensa.toLowerCase()} disponible.`
        : 'Ingresa el PIN para confirmar.';

      document.getElementById('faltanText').textContent = premioDisponible
        ? 'Listo para canje.'
        : `Faltan ${faltan} ${faltan === 1 ? 'punto' : 'puntos'}.`;

      btnCanjear.classList.toggle('hidden', !premioDisponible);
      renderCups(points, state.metaPuntos);
    }

    async function apiGet(params) {
      const url = `${API_URL}?${new URLSearchParams(params).toString()}`;
      const res = await fetch(url);
      return res.json();
    }

    async function apiPost(payload) {
      const form = new URLSearchParams();
      Object.keys(payload).forEach(key => {
        form.append(key, payload[key] ?? '');
      });

      const res = await fetch(API_URL, {
        method: 'POST',
        body: form
      });

      return res.json();
    }

    async function loadClient() {
      state.id = qs('id');

      if (!state.id) {
        loadingView.innerHTML = `
          <div class="loading-card">
            <div class="loading-icon">⚠️</div>
            <strong>QR inválido</strong>
            <p>No se encontró el ID del cliente.</p>
          </div>
        `;
        return;
      }

      if (API_URL.includes('PEGAR_AQUI')) {
        state.cliente = {
          id_cliente: state.id,
          nombre: 'Ana López',
          telefono: '5551234',
          correo: 'ana@demo.com',
          puntos: 4,
          fecha_registro: new Date().toISOString(),
          ultima_visita: new Date(Date.now() - 86400000).toISOString(),
          premio_disponible: 'NO',
          qr_id: state.id,
          estado: 'ACTIVO'
        };
        renderCliente();
        showApp();
        showStatus('Modo demo activo.', 'info');
        return;
      }

      try {
        const data = await apiGet({ action: 'getClient', id: state.id });
        if (!data.ok) throw new Error(data.message || 'No se encontró el cliente');
        state.cliente = data.cliente;
        state.metaPuntos = Number(
          data.meta_puntos ||
          data.metaPuntos ||
          data.cliente?.meta_puntos ||
          data.cliente?.metaPuntos ||
          data.cliente?.meta ||
          10
        );
        renderCliente();
        showApp();
      } catch (error) {
        loadingView.innerHTML = `
          <div class="loading-card">
            <div class="loading-icon">⚠️</div>
            <strong>No se pudo cargar</strong>
            <p>${error.message || 'Ocurrió un problema al leer el cliente.'}</p>
          </div>
        `;
      }
    }

    async function refreshClient() {
      hideStatus();
      if (!state.id || API_URL.includes('PEGAR_AQUI')) {
        renderCliente();
        return;
      }
      try {
        const data = await apiGet({ action: 'getClient', id: state.id });
        if (!data.ok) throw new Error(data.message || 'No se pudo actualizar');
        state.cliente = data.cliente;
        renderCliente();
      } catch (error) {
        showStatus(error.message || 'No se pudo actualizar la tarjeta.', 'error');
      }
    }

    async function confirmPoint() {
      hideStatus();
      const pin = pinInput.value.trim();
      const usuario = usuarioInput.value.trim() || 'Caja 1';
      document.getElementById('usuarioMostradorLabel').textContent = usuario;

      if (!pin) {
        showStatus('Ingresa el PIN para continuar.', 'error');
        pinInput.focus();
        return;
      }

      if (API_URL.includes('PEGAR_AQUI')) {
        state.cliente.puntos = Number(state.cliente.puntos || 0) + 1;
        if (state.cliente.puntos >= state.metaPuntos) state.cliente.premio_disponible = 'SI';
        state.cliente.ultima_visita = new Date().toISOString();
        renderCliente();
        pinInput.value = '';
        showStatus(state.cliente.premio_disponible === 'SI'
          ? 'Modo demo: punto agregado. El cliente ya tiene recompensa disponible.'
          : 'Modo demo: punto agregado correctamente.', 'ok');
        return;
      }

      try {
        btnConfirmar.disabled = true;
        btnConfirmar.textContent = 'Guardando...';
        const data = await apiPost({
          action: 'confirmPoint',
          id: state.id,
          pin,
          usuario
        });

        if (!data.ok) throw new Error(data.message || 'No se pudo confirmar el punto');

        state.cliente = {
          ...state.cliente,
          ...data.cliente,
          ultima_visita: new Date().toISOString()
        };
        renderCliente();
        pinInput.value = '';
        showStatus(data.message || 'Punto agregado correctamente.', 'ok');
      } catch (error) {
        showStatus(error.message || 'Ocurrió un error al confirmar el punto.', 'error');
      } finally {
        btnConfirmar.disabled = false;
        btnConfirmar.textContent = 'Confirmar punto';
      }
    }

    async function redeemReward() {
      hideStatus();
      const pin = pinInput.value.trim();
      const usuario = usuarioInput.value.trim() || 'Caja 1';
      document.getElementById('usuarioMostradorLabel').textContent = usuario;

      if (!pin) {
        showStatus('Ingresa el PIN para canjear la recompensa.', 'error');
        pinInput.focus();
        return;
      }

      if (API_URL.includes('PEGAR_AQUI')) {
        state.cliente.puntos = 0;
        state.cliente.premio_disponible = 'NO';
        state.cliente.ultima_visita = new Date().toISOString();
        renderCliente();
        pinInput.value = '';
        showStatus('Modo demo: recompensa canjeada correctamente.', 'ok');
        return;
      }

      try {
        btnCanjear.disabled = true;
        btnCanjear.textContent = 'Canjeando...';
        const data = await apiPost({
          action: 'redeemReward',
          id: state.id,
          pin,
          usuario
        });

        if (!data.ok) throw new Error(data.message || 'No se pudo canjear la recompensa');

        await refreshClient();
        pinInput.value = '';
        showStatus(data.message || 'Premio canjeado correctamente.', 'ok');
      } catch (error) {
        showStatus(error.message || 'Ocurrió un error al canjear la recompensa.', 'error');
      } finally {
        btnCanjear.disabled = false;
        btnCanjear.textContent = 'Canjear recompensa';
      }
    }

    btnVerPin.addEventListener('click', () => {
      const isPassword = pinInput.type === 'password';
      pinInput.type = isPassword ? 'text' : 'password';
      btnVerPin.textContent = isPassword ? 'Ocultar' : 'Ver';
    });

    usuarioInput.addEventListener('input', () => {
      document.getElementById('usuarioMostradorLabel').textContent = safeText(usuarioInput.value, 'Caja 1');
    });

    btnRecargar.addEventListener('click', refreshClient);
    btnConfirmar.addEventListener('click', confirmPoint);
    btnCanjear.addEventListener('click', redeemReward);

    loadClient();
  </script>
</body>
</html>
