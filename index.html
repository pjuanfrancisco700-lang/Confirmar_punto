<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar punto</title>
</head>
<body>

<h2>Confirmar punto</h2>

<p id="cliente"></p>

<input type="text" id="usuarioInput" placeholder="Caja 1" value="Caja 1" />
<input type="password" id="pinInput" placeholder="PIN" />

<button onclick="confirmar()">Confirmar punto</button>

<p id="status"></p>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwJjVizJZJ8tDyA7ESkdfIhaagZ1pEMTnvJpPny6HuhLDRoKwTJu06-L2ZpJVMVO4lR/exec';

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

const status = document.getElementById('status');
const clienteEl = document.getElementById('cliente');

async function cargarCliente() {
  if (!id) {
    status.innerText = 'QR inválido';
    return;
  }

  const res = await fetch(API_URL + '?action=getClient&id=' + id);
  const data = await res.json();

  if (!data.ok) {
    status.innerText = data.message;
    return;
  }

  clienteEl.innerText = 'Cliente: ' + data.cliente.nombre;
}

async function apiPost(payload) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    return data;

  } catch (error) {
    return { ok: false, message: 'Error de conexión' };
  }
}

async function confirmar() {
  const pin = document.getElementById('pinInput').value;
  const usuario = document.getElementById('usuarioInput').value || 'Caja 1';

  if (!pin) {
    status.innerText = 'Ingresa el PIN';
    return;
  }

  const data = await apiPost({
    action: 'confirmPoint',
    id: id,
    pin: pin,
    usuario: usuario
  });

  if (!data.ok) {
    status.innerText = data.message;
    return;
  }

  status.innerText = 'Punto agregado correctamente';
}

cargarCliente();
</script>

</body>
</html>
