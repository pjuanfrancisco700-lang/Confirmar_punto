<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="color-scheme" content="light" />
  <title>Confirmar punto</title>
  <style>
    :root {
      --bg: #efe9e2;
      --bg-2: #f7f3ee;
      --card: #fcfaf7;
      --card-2: #f8f4ef;
      --text: #1d1714;
      --muted: #7b6f67;
      --line: rgba(78, 60, 47, 0.10);
      --line-2: rgba(78, 60, 47, 0.14);
      --accent: #8b6244;
      --accent-dark: #6f4e37;
      --success: #6f9368;
      --danger: #b65f5f;
      --shadow-1: 0 10px 24px rgba(43, 31, 24, 0.06);
      --shadow-2: 0 20px 50px rgba(43, 31, 24, 0.10);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --maxw: 440px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #faf7f3 0%, #f2ece5 36%, #e9e1d8 100%);
      color-scheme: light;
    }

    @media (prefers-color-scheme: dark) {
      html, body {
        background:
          radial-gradient(circle at top, #faf7f3 0%, #f2ece5 36%, #e9e1d8 100%) !important;
        color: var(--text) !important;
        color-scheme: light !important;
      }
    }

    body {
      display: flex;
      justify-content: center;
      padding: 12px;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    .shell {
      width: 100%;
      max-width: var(--maxw);
    }

    .phone {
      min-height: calc(100vh - 24px);
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(246,241,235,0.94) 100%);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: var(--shadow-2);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(18px);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.7), transparent 35%),
        radial-gradient(circle at bottom left, rgba(255,255,255,0.45), transparent 30%);
      pointer-events: none;
    }

    .screen {
      position: relative;
      z-index: 1;
      padding: 16px;
      padding-bottom: 22px;
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 2px;
      padding: 2px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -0.04em;
      min-width: 0;
    }

    .brand-badge,
    .icon-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f4eee7 100%);
      border: 1px solid rgba(115, 92, 75, 0.10);
      box-shadow: var(--shadow-1);
      flex-shrink: 0;
    }

    .brand-badge {
      font-size: 20px;
    }

    .brand #negocioNombre {
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      border: 1px solid rgba(115, 92, 75, 0.10);
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .icon-btn:active,
    .ghost-btn:active,
    .primary-btn:active,
    .secondary-btn:active {
      transform: scale(0.985);
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.94) 0%, rgba(248,243,237,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: var(--shadow-1);
    }

    .hero {
      padding: 22px 18px 18px;
      background:
        linear-gradient(180deg, #f9f6f2 0%, #f4efe8 100%);
      border: 1px solid rgba(255,255,255,0.95);
    }

    .eyebrow {
      color: #6f6258;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
      font-weight: 800;
      margin: 0 0 12px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .hero h1 {
      font-size: 33px;
      line-height: 1.02;
      letter-spacing: -0.07em;
      margin-bottom: 10px;
    }

    .hero p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .tiny-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #6d6057;
      background: linear-gradient(180deg, #ffffff 0%, #f7f2ec 100%);
      border: 1px solid rgba(115, 92, 75, 0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .progress-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .progress-head h2 {
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: -0.05em;
      margin-bottom: 4px;
    }

    .progress-head p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .big-points {
      font-size: 18px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      padding-top: 4px;
    }

    .big-points strong {
      color: var(--text);
      font-size: 28px;
      letter-spacing: -0.06em;
    }

    .cups {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .cup {
      aspect-ratio: 1;
      border-radius: 20px;
      background: linear-gradient(180deg, #fbf8f4 0%, #f4efea 100%);
      border: 1px solid rgba(113, 90, 72, 0.10);
      display: grid;
      place-items: center;
      font-size: 28px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
      color: #c4b7ab;
      transition: all .22s ease;
    }

    .cup.filled {
      background: linear-gradient(180deg, #a17552 0%, #8b6244 100%);
      border-color: rgba(111, 78, 55, 0.22);
      color: #fffaf6;
      box-shadow:
        0 10px 20px rgba(111, 78, 55, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .info-grid {
      display: grid;
      gap: 0;
      margin-bottom: 8px;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 0;
      border-top: 1px solid rgba(115, 92, 75, 0.10);
    }

    .info-row:first-child {
      border-top: none;
      padding-top: 4px;
    }

    .info-label {
      color: #6f635a;
      font-size: 13px;
      font-weight: 700;
    }

    .info-value {
      font-weight: 800;
      text-align: right;
      font-size: 14px;
      line-height: 1.3;
      max-width: 60%;
      word-break: break-word;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .field label {
      font-size: 13px;
      font-weight: 800;
      color: #594c44;
      letter-spacing: -0.02em;
    }

    .pin-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    .field input {
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(115, 92, 75, 0.10);
      background: linear-gradient(180deg, #ffffff 0%, #fbf8f4 100%);
      border-radius: 22px;
      padding: 16px 18px;
      font-size: 17px;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .field input::placeholder {
      color: #a59689;
    }

    .field input:focus {
      border-color: rgba(139, 98, 68, 0.28);
      box-shadow: 0 0 0 4px rgba(139, 98, 68, 0.08);
      background: #fff;
    }

    .ghost-btn,
    .primary-btn,
    .secondary-btn {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 20px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .secondary-btn {
      background: linear-gradient(180deg, #86a97f 0%, #6f9368 100%);
      color: #ffffff;
      box-shadow: 0 14px 26px rgba(111, 147, 104, 0.20);
    }

    .primary-btn {
      background: linear-gradient(180deg, #9a704f 0%, #7b5941 100%);
      color: #fffaf7;
      box-shadow: 0 14px 26px rgba(123, 89, 65, 0.18);
    }

    .ghost-btn {
      width: auto;
      min-width: 72px;
      padding-inline: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f6f0ea 100%);
      color: var(--text);
      border: 1px solid rgba(115, 92, 75, 0.10);
      box-shadow: var(--shadow-1);
    }

    .status-box {
      border-radius: 18px;
      padding: 14px 15px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
      border: 1px solid transparent;
    }

    .status-box.info {
      background: rgba(139, 98, 68, 0.08);
      color: var(--accent-dark);
      border-color: rgba(139, 98, 68, 0.10);
    }

    .status-box.ok {
      background: rgba(111, 147, 104, 0.10);
      color: var(--success);
      border-color: rgba(111, 147, 104, 0.14);
    }

    .status-box.error {
      background: rgba(182, 95, 95, 0.10);
      color: var(--danger);
      border-color: rgba(182, 95, 95, 0.14);
    }

    .status-hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .split-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .center-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      padding: 2px 8px 0;
    }

    .loading {
      min-height: calc(100vh - 24px);
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    .loading-card {
      width: 100%;
      max-width: 280px;
      padding: 26px 20px;
      border-radius: 28px;
      background: linear-gradient(180deg, #ffffff 0%, #f6f1eb 100%);
      border: 1px solid rgba(255,255,255,0.96);
      box-shadow: var(--shadow-1);
    }

    .loading-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #f2ece5 100%);
      border: 1px solid rgba(115, 92, 75, 0.08);
      box-shadow: var(--shadow-1);
      font-size: 28px;
    }

    .loading strong {
      display: block;
      color: var(--text);
      font-size: 19px;
      letter-spacing: -0.04em;
    }

    .loading p {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 390px) {
      body {
        padding: 8px;
      }

      .phone {
        min-height: calc(100vh - 16px);
        border-radius: 30px;
      }

      .screen {
        padding: 13px;
        gap: 10px;
      }

      .hero {
        padding: 18px 16px 16px;
      }

      .hero h1 {
        font-size: 29px;
      }

      .cups {
        gap: 9px;
      }

      .cup {
        border-radius: 18px;
        font-size: 24px;
      }

      .card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="phone">
      <div id="loadingView" class="loading">
        <div class="loading-card">
          <div class="loading-icon">☕</div>
          <strong>Cargando</strong>
          <p>Preparando datos del cliente.</p>
        </div>
      </div>

      <div id="appView" class="screen hidden">
        <div class="topbar">
          <div class="brand">
            <div class="brand-badge">☕</div>
            <div id="negocioNombre">Café Urbano</div>
          </div>
          <button class="icon-btn" id="btnRecargar" title="Recargar">↻</button>
        </div>

        <div class="card hero">
          <p class="eyebrow">Confirmar punto</p>
          <h1 id="clienteNombre">Cliente</h1>
          <p id="heroMsg">Ingresa el PIN para confirmar.</p>
          <div class="meta-row">
            <span class="tiny-pill" id="clienteId">ID: —</span>
            <span class="tiny-pill" id="clienteEstado">Estado: —</span>
          </div>
        </div>

        <div class="card">
          <div class="progress-head">
            <div>
              <h2>Progreso</h2>
              <p id="faltanText">Puntos pendientes.</p>
            </div>
            <div class="big-points"><strong id="pointsCount">0</strong> / <span id="goalCount">10</span></div>
          </div>
          <div class="cups" id="cupsGrid"></div>
        </div>

        <div class="card">
          <div class="info-grid">
            <div class="info-row">
              <span class="info-label">Última visita</span>
              <span class="info-value" id="ultimaVisita">—</span>
            </div>
            <div class="info-row">
              <span class="info-label">Premio</span>
              <span class="info-value" id="premioEstado">Sin premio</span>
            </div>
            <div class="info-row">
              <span class="info-label">Mostrador</span>
              <span class="info-value" id="usuarioMostradorLabel">Caja 1</span>
            </div>
          </div>

          <div class="field">
            <label for="usuarioInput">Caja o encargado</label>
            <input id="usuarioInput" type="text" value="Caja 1" placeholder="Caja 1" style="letter-spacing: normal; font-size: 15px;" />
          </div>

          <div class="field">
            <label for="pinInput">PIN</label>
            <div class="pin-wrap">
              <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••" />
              <button class="ghost-btn" id="btnVerPin" type="button">Ver</button>
            </div>
          </div>

          <div class="split-actions" style="margin-top:16px;">
            <button class="secondary-btn" id="btnConfirmar">Confirmar punto</button>
            <button class="primary-btn hidden" id="btnCanjear">Canjear recompensa</button>
          </div>

          <div id="statusBox" class="status-box info status-hidden" style="margin-top:14px;"></div>
        </div>

        <p class="center-note">El punto solo se guarda con un PIN válido.</p>
      </div>
    </div>
  </div>

  <script>
    /*
      PEGA AQUÍ TU URL DE APPS SCRIPT
      Ejemplo: const API_URL = 'https://script.google.com/macros/s/XXXXXXXX/exec';
    */
    const API_URL = 'https://script.google.com/macros/s/AKfycbwJjVizJZJ8tDyA7ESkdfIhaagZ1pEMTnvJpPny6HuhLDRoKwTJu06-L2ZpJVMVO4lR/exec';
    const DEFAULT_GOAL = 0;
    const DEFAULT_REWARD = 'Café gratis';

    const loadingView = document.getElementById('loadingView');
    const appView = document.getElementById('appView');
    const btnRecargar = document.getElementById('btnRecargar');
    const btnVerPin = document.getElementById('btnVerPin');
    const btnConfirmar = document.getElementById('btnConfirmar');
    const btnCanjear = document.getElementById('btnCanjear');
    const statusBox = document.getElementById('statusBox');
    const pinInput = document.getElementById('pinInput');
    const usuarioInput = document.getElementById('usuarioInput');

    const state = {
      id: null,
      cliente: null,
      metaPuntos: DEFAULT_GOAL,
      recompensa: DEFAULT_REWARD,
      negocio: 'Café Urbano'
    };

    function qs(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function safeText(value, fallback = '—') {
      return value && String(value).trim() ? String(value).trim() : fallback;
    }

    function formatDate(value) {
      if (!value) return 'Sin registro';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return safeText(value, 'Sin fecha');
      return date.toLocaleString('es-GT', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showStatus(message, type = 'info') {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.classList.remove('status-hidden');
    }

    function hideStatus() {
      statusBox.className = 'status-box info status-hidden';
      statusBox.textContent = '';
    }

    function showApp() {
      loadingView.classList.add('hidden');
      appView.classList.remove('hidden');
    }

    function renderCups(points, goal) {
      const cupsGrid = document.getElementById('cupsGrid');
      cupsGrid.innerHTML = '';
      const total = Math.max(Number(goal) || 1, 1);
      for (let i = 1; i <= total; i++) {
        const item = document.createElement('div');
        item.className = `cup ${i <= points ? 'filled' : ''}`;
        item.textContent = '☕';
        cupsGrid.appendChild(item);
      }
    }

    function renderCliente() {
      const c = state.cliente;
      if (!c) return;

      const points = Number(c.puntos || 0);
      const premioDisponible = String(c.premio_disponible || 'NO').toUpperCase() === 'SI';
      const faltan = Math.max(0, state.metaPuntos - points);

      document.getElementById('negocioNombre').textContent = state.negocio;
      document.getElementById('clienteNombre').textContent = safeText(c.nombre, 'Cliente');
      document.getElementById('clienteId').textContent = `ID: ${safeText(c.id_cliente)}`;
      document.getElementById('clienteEstado').textContent = `Estado: ${safeText(c.estado, 'ACTIVO')}`;
      document.getElementById('pointsCount').textContent = points;
      document.getElementById('goalCount').textContent = state.metaPuntos;
      document.getElementById('ultimaVisita').textContent = formatDate(c.ultima_visita);
      document.getElementById('premioEstado').textContent = premioDisponible ? `${state.recompensa} disponible` : 'Sin premio';
      document.getElementById('usuarioMostradorLabel').textContent = safeText(usuarioInput.value, 'Caja 1');

      document.getElementById('heroMsg').textContent = premioDisponible
        ? `Este cliente ya tiene ${state.recompensa.toLowerCase()} disponible.`
        : 'Ingresa el PIN para confirmar.';

      document.getElementById('faltanText').textContent = premioDisponible
        ? 'Listo para canje.'
        : `Faltan ${faltan} ${faltan === 1 ? 'punto' : 'puntos'}.`;

      btnCanjear.classList.toggle('hidden', !premioDisponible);
      renderCups(points, state.metaPuntos);
    }

    async function apiGet(params) {
      const url = `${API_URL}?${new URLSearchParams(params).toString()}`;
      const res = await fetch(url);
      return res.json();
    }

    async function apiPost(payload) {
      const form = new URLSearchParams();
      Object.keys(payload).forEach(key => {
        form.append(key, payload[key] ?? '');
      });

      const res = await fetch(API_URL, {
        method: 'POST',
        body: form
      });

      return res.json();
    }

    async function loadClient() {
      state.id = qs('id');

      if (!state.id) {
        loadingView.innerHTML = `
          <div class="loading-card">
            <div class="loading-icon">⚠️</div>
            <strong>QR inválido</strong>
            <p>No se encontró el ID del cliente.</p>
          </div>
        `;
        return;
      }

      if (API_URL.includes('PEGAR_AQUI')) {
        state.cliente = {
          id_cliente: state.id,
          nombre: 'Ana López',
          telefono: '5551234',
          correo: 'ana@demo.com',
          puntos: 4,
          fecha_registro: new Date().toISOString(),
          ultima_visita: new Date(Date.now() - 86400000).toISOString(),
          premio_disponible: 'NO',
          qr_id: state.id,
          estado: 'ACTIVO'
        };
        renderCliente();
        showApp();
        showStatus('Modo demo activo.', 'info');
        return;
      }

      try {
        const data = await apiGet({ action: 'getClient', id: state.id });
        if (!data.ok) throw new Error(data.message || 'No se encontró el cliente');
        state.cliente = data.cliente;
        state.metaPuntos = Number(
          data.meta_puntos ||
          data.metaPuntos ||
          data.cliente?.meta_puntos ||
          data.cliente?.metaPuntos ||
          data.cliente?.meta ||
          10
        );
        renderCliente();
        showApp();
      } catch (error) {
        loadingView.innerHTML = `
          <div class="loading-card">
            <div class="loading-icon">⚠️</div>
            <strong>No se pudo cargar</strong>
            <p>${error.message || 'Ocurrió un problema al leer el cliente.'}</p>
          </div>
        `;
      }
    }

    async function refreshClient() {
      hideStatus();
      if (!state.id || API_URL.includes('PEGAR_AQUI')) {
        renderCliente();
        return;
      }
      try {
        const data = await apiGet({ action: 'getClient', id: state.id });
        if (!data.ok) throw new Error(data.message || 'No se pudo actualizar');
        state.cliente = data.cliente;
        renderCliente();
      } catch (error) {
        showStatus(error.message || 'No se pudo actualizar la tarjeta.', 'error');
      }
    }

    async function confirmPoint() {
      hideStatus();
      const pin = pinInput.value.trim();
      const usuario = usuarioInput.value.trim() || 'Caja 1';
      document.getElementById('usuarioMostradorLabel').textContent = usuario;

      if (!pin) {
        showStatus('Ingresa el PIN para continuar.', 'error');
        pinInput.focus();
        return;
      }

      if (API_URL.includes('PEGAR_AQUI')) {
        state.cliente.puntos = Number(state.cliente.puntos || 0) + 1;
        if (state.cliente.puntos >= state.metaPuntos) state.cliente.premio_disponible = 'SI';
        state.cliente.ultima_visita = new Date().toISOString();
        renderCliente();
        pinInput.value = '';
        showStatus(state.cliente.premio_disponible === 'SI'
          ? 'Modo demo: punto agregado. El cliente ya tiene recompensa disponible.'
          : 'Modo demo: punto agregado correctamente.', 'ok');
        return;
      }

      try {
        btnConfirmar.disabled = true;
        btnConfirmar.textContent = 'Guardando...';
        const data = await apiPost({
          action: 'confirmPoint',
          id: state.id,
          pin,
          usuario
        });

        if (!data.ok) throw new Error(data.message || 'No se pudo confirmar el punto');

        state.cliente = {
          ...state.cliente,
          ...data.cliente,
          ultima_visita: new Date().toISOString()
        };
        renderCliente();
        pinInput.value = '';
        showStatus(data.message || 'Punto agregado correctamente.', 'ok');
      } catch (error) {
        showStatus(error.message || 'Ocurrió un error al confirmar el punto.', 'error');
      } finally {
        btnConfirmar.disabled = false;
        btnConfirmar.textContent = 'Confirmar punto';
      }
    }

    async function redeemReward() {
      hideStatus();
      const pin = pinInput.value.trim();
      const usuario = usuarioInput.value.trim() || 'Caja 1';
      document.getElementById('usuarioMostradorLabel').textContent = usuario;

      if (!pin) {
        showStatus('Ingresa el PIN para canjear la recompensa.', 'error');
        pinInput.focus();
        return;
      }

      if (API_URL.includes('PEGAR_AQUI')) {
        state.cliente.puntos = 0;
        state.cliente.premio_disponible = 'NO';
        state.cliente.ultima_visita = new Date().toISOString();
        renderCliente();
        pinInput.value = '';
        showStatus('Modo demo: recompensa canjeada correctamente.', 'ok');
        return;
      }

      try {
        btnCanjear.disabled = true;
        btnCanjear.textContent = 'Canjeando...';
        const data = await apiPost({
          action: 'redeemReward',
          id: state.id,
          pin,
          usuario
        });

        if (!data.ok) throw new Error(data.message || 'No se pudo canjear la recompensa');

        await refreshClient();
        pinInput.value = '';
        showStatus(data.message || 'Premio canjeado correctamente.', 'ok');
      } catch (error) {
        showStatus(error.message || 'Ocurrió un error al canjear la recompensa.', 'error');
      } finally {
        btnCanjear.disabled = false;
        btnCanjear.textContent = 'Canjear recompensa';
      }
    }

    btnVerPin.addEventListener('click', () => {
      const isPassword = pinInput.type === 'password';
      pinInput.type = isPassword ? 'text' : 'password';
      btnVerPin.textContent = isPassword ? 'Ocultar' : 'Ver';
    });

    usuarioInput.addEventListener('input', () => {
      document.getElementById('usuarioMostradorLabel').textContent = safeText(usuarioInput.value, 'Caja 1');
    });

    btnRecargar.addEventListener('click', refreshClient);
    btnConfirmar.addEventListener('click', confirmPoint);
    btnCanjear.addEventListener('click', redeemReward);

    loadClient();
  </script>
</body>
</html>
